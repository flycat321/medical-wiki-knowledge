<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交结果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; border-radius: 16px; padding: 48px; text-align: center; max-width: 480px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .icon { font-size: 56px; margin-bottom: 16px; }
        .title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .msg { font-size: 14px; color: #666; margin-bottom: 24px; }
        .btn { display: inline-block; padding: 10px 24px; border-radius: 8px; text-decoration: none; font-size: 14px; margin: 0 6px; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-secondary { background: #f0f2f5; color: #333; }
    </style>
</head>
<body>
    <div class="card">
        {% if success %}
        <div class="icon">✅</div>
        <div class="title">提交成功</div>
        {% else %}
        <div class="icon">❌</div>
        <div class="title">提交失败</div>
        {% endif %}
        <div class="msg">{{ message }}</div>
        <a href="/submit" class="btn btn-primary">继续提交</a>
        <a href="/" class="btn btn-secondary">返回首页</a>
    </div>
</body>
</html>
